<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}QR Generator{% endblock %} — Local Loop</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  {% if session.authenticated %}
  <nav class="navbar">
    <a class="nav-brand" href="{{ url_for('index') }}">Local Loop QR</a>
    <form method="post" action="{{ url_for('logout') }}" class="nav-logout">
      <button type="submit" class="btn btn-secondary btn-sm">Log out</button>
    </form>
  </nav>
  {% endif %}

  <main class="container">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="flash-messages" role="alert">
          {% for category, message in messages %}
            <div class="flash flash-{{ category }}">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </main>
</body>
</html>
